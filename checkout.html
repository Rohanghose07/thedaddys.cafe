<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkout | The Daddy's Cafe</title><link rel="stylesheet" href="styles.css"></head><body>
<header class="site-header"><a href="cart.html" class="brand"><img src="assets/logo.png"><div class="brand-copy"><strong>The Daddy's Cafe</strong><span>Checkout</span></div></a></header>
<main class="flow-shell"><div class="flow-grid"><section class="flow-card"><h1>Checkout</h1><div class="checkout-form">
<label>Name *<input id="name"></label><label>Mobile Number *<input id="phone" inputmode="numeric" placeholder="10-digit mobile number"></label>
<div><strong>Order Type</strong><div class="type-row" style="margin-top:8px"><button class="type-btn active" data-type="Takeaway">Takeaway<br><small>₹15 Packing & Disposables</small></button><button class="type-btn" data-type="Delivery">Delivery<br><small>₹40 Delivery & Handling</small></button></div></div>
<div id="deliveryFields" class="hidden"><label>Full Delivery Address *<textarea id="address"></textarea></label><label>Landmark<input id="landmark"></label></div>
<label>Preferred Time<select id="scheduleMode"><option value="asap">As soon as possible</option><option value="later">Schedule for later</option></select></label>
<div id="scheduleFields" class="hidden"><label>Date<input id="date" type="date"></label><label>Time<input id="time" type="time"></label></div>
<label>Special Instructions<textarea id="note"></textarea></label>
<div><strong>Promo Code</strong><div class="promo-row" style="margin-top:8px"><input id="promo" placeholder="Enter promo code"><button id="applyPromo" class="type-btn">Apply</button></div><div id="promoMsg" class="promo-msg"></div></div>
</div></section>
<aside class="flow-card"><h2>Payment Summary</h2><div class="summary-row"><span>Food Subtotal</span><strong id="sub">₹0</strong></div><div class="summary-row" id="discountRow" style="display:none"><span id="discountLabel">Promo Discount</span><strong id="discount">-₹0</strong></div><div class="summary-row"><span>Convenience Fee (3%)</span><strong id="conv">₹0</strong></div><div class="summary-row"><span id="handlingLabel">Packing & Disposables</span><strong id="handling">₹15</strong></div><div class="summary-row total"><span>Total Payable</span><strong id="total">₹0</strong></div><button id="pay" class="primary-wide">Continue to Secure Payment →</button><a class="secondary-wide" href="cart.html">← Back to Cart</a><p id="err" class="promo-msg promo-bad"></p></aside></div></main><script src="checkout.js"></script></body></html>
